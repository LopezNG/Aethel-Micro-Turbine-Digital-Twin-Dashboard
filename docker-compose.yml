services:
  mlflow:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["mlflow", "server", "--backend-store-uri", "/app/mlruns", "--default-artifact-root", "/app/mlruns", "--host", "0.0.0.0", "--port", "5000"]
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AETHEL_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,http://localhost:8080,http://127.0.0.1:8080
      AETHEL_DATA_DIR: /app/Machine Learning/micro gas turbine electrical energy prediction dataset
      AETHEL_LSTM_ARTIFACT_DIR: /app/Machine Learning/artifacts/lstm
      AETHEL_REPORTS_DIR: /app/reports
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./my-project
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
